name: Frontend CI

on:
  push:
    branches: [master]
    paths: ['spiderbridge/frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    paths: ['spiderbridge/frontend/**', '.github/workflows/frontend-ci.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spiderbridge/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spiderbridge/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
