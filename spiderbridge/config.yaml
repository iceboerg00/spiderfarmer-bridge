name: SpiderBridge
slug: spiderbridge
version: "1.0.6"
description: Spider Farmer GGS Controller → Home Assistant via MQTT Discovery
url: https://github.com/iceboerg00/spiderfarmer-bridge
arch:
  - aarch64
  - armhf
startup: application
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
  - SYS_ADMIN
  - NET_RAW
options:
  hotspot_enabled: true
  ssid: "SF-Bridge"
  password: "changeme123"
  channel: 6
  hotspot_ip: "192.168.10.1"
  device_name: "Spider Farmer GGS"
schema:
  hotspot_enabled: bool
  ssid: str
  password: str
  channel: "int(1,11)"
  hotspot_ip: str
  device_name: str
