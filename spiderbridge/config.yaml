name: SpiderBridge
slug: spiderbridge
version: "1.6.7"
description: Spider Farmer GGS Controller → Home Assistant via MQTT Discovery
url: https://github.com/iceboerg00/spiderfarmer-bridge
# `image:` (pre-built GHCR pull) gets enabled by .github/workflows/
# addon-publish.yml the first time an addon-v* tag is pushed. Until
# then Supervisor builds the image locally from the Dockerfile.
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
startup: application
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
  - SYS_ADMIN
  - NET_RAW
map:
  - config:rw
# Required so cont-init/03-install-card can hit /core/api/lovelace/resources
# with the Supervisor-provided token — without this Supervisor returns 401
# and the card registration silently no-ops.
homeassistant_api: true
# Tell Supervisor we provide an MQTT broker — this triggers HA's MQTT
# integration to offer a one-click setup notification on first install.
# Replaces the previous custom_component shim, which duplicated MQTT
# Discovery and was missing modern HA feature flags (cf. issue #5).
discovery:
  - mqtt
services:
  - mqtt:provide
options:
  hotspot_enabled: true
  ssid: "SF-Bridge"
  password: "changeme123"
  channel: 6
  hotspot_ip: "192.168.10.1"
schema:
  hotspot_enabled: bool
  ssid: str
  password: str
  channel: "int(1,11)"
  hotspot_ip: str
