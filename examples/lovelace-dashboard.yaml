# Spider Farmer GGS — Lovelace Dashboard
#
# Drop-in dashboard that mirrors the SF App's "Lampe Einstellungen" and
# "Lüfter-Einstellungen" screens: top section is the device control,
# below it a mode picker, then conditional setting groups that swap in
# based on the selected mode (like the SF App's tabs).
#
# Entity IDs assume the device's friendly_name = "GGS" (the default
# from setup/wizard.sh). If yours differs, find/replace `ggs_` with
# your prefix.
#
# How to use:
#   1. In HA: Settings → Dashboards → "+ ADD DASHBOARD" → Empty
#   2. Open the new dashboard → ⋮ → "Edit Dashboard" → ⋮ → "Raw Configuration Editor"
#   3. Paste the YAML below. Save. Done.
#
# Required: only built-in HA cards (entities, light, conditional,
# vertical-stack, tile). No HACS plugins needed.

title: Spider Farmer
views:

  # ── Light 1 ───────────────────────────────────────────────────────────────
  - title: Light
    icon: mdi:lightbulb
    cards:

      - type: vertical-stack
        cards:
          - type: tile
            entity: light.ggs_light_1
            name: Light 1
            features:
              - type: light-brightness
          # Dedicated mode picker — selecting an effect here swaps the
          # settings card below.
          - type: tile
            entity: light.ggs_light_1
            name: Mode
            features:
              - type: light-effect

          # Schedule Mode — only visible when light effect is "Schedule"
          - type: conditional
            conditions:
              - entity: light.ggs_light_1
                attribute: effect
                state: Schedule
            card:
              type: entities
              title: Schedule Mode
              icon: mdi:calendar-clock
              entities:
                - entity: number.ggs_light_1_schedule_mode_brightness
                  name: Brightness
                - entity: text.ggs_light_1_schedule_mode_start_time
                  name: Start Time
                - entity: text.ggs_light_1_schedule_mode_end_time
                  name: End Time
                - entity: number.ggs_light_1_schedule_mode_fade_time
                  name: Fade Time

          # PPFD Mode — only visible when light effect is "PPFD"
          - type: conditional
            conditions:
              - entity: light.ggs_light_1
                attribute: effect
                state: PPFD
            card:
              type: entities
              title: PPFD Mode
              icon: mdi:white-balance-sunny
              entities:
                - entity: number.ggs_light_1_ppfd_mode_target_ppfd
                  name: Target PPFD
                - entity: text.ggs_light_1_ppfd_mode_start_time
                  name: Start Time
                - entity: text.ggs_light_1_ppfd_mode_end_time
                  name: End Time
                - entity: number.ggs_light_1_ppfd_mode_fade_time
                  name: Fade Time
                - entity: number.ggs_light_1_ppfd_mode_min_brightness
                  name: Min Brightness
                - entity: number.ggs_light_1_ppfd_mode_max_brightness
                  name: Max Brightness

          # Temperature Protection — applies in every mode, always visible
          - type: entities
            title: Temperature Protection
            icon: mdi:thermometer-alert
            entities:
              - entity: number.ggs_light_1_schedule_mode_dim_threshold
                name: Dim Threshold
              - entity: number.ggs_light_1_schedule_mode_off_threshold
                name: Off Threshold

      # Light 2 — simple control, no settings
      - type: tile
        entity: light.ggs_light_2
        name: Light 2
        features:
          - type: light-brightness

  # ── Fan Circulation ───────────────────────────────────────────────────────
  - title: Fan Circulation
    icon: mdi:fan
    cards:

      - type: vertical-stack
        cards:
          - type: tile
            entity: fan.ggs_fan_circulation
            name: Fan Circulation
            features:
              - type: fan-speed
          # Dedicated mode picker — selecting a preset here swaps the
          # settings card below.
          - type: tile
            entity: fan.ggs_fan_circulation
            name: Mode
            features:
              - type: fan-preset-modes
                style: dropdown

          # Schedule Mode
          - type: conditional
            conditions:
              - entity: fan.ggs_fan_circulation
                attribute: preset_mode
                state: Schedule
            card:
              type: entities
              title: Schedule Mode
              icon: mdi:calendar-clock
              entities:
                - entity: text.ggs_fan_schedule_mode_start_time
                  name: Start Time
                - entity: text.ggs_fan_schedule_mode_end_time
                  name: End Time
                - entity: number.ggs_fan_schedule_mode_speed
                  name: Speed
                - entity: number.ggs_fan_schedule_mode_standby_speed
                  name: Standby Speed
                - entity: number.ggs_fan_schedule_mode_oscillation
                  name: Oscillation
                - entity: switch.ggs_fan_schedule_mode_natural_wind
                  name: Natural Wind

          # Cycle Mode
          - type: conditional
            conditions:
              - entity: fan.ggs_fan_circulation
                attribute: preset_mode
                state: Cycle
            card:
              type: entities
              title: Cycle Mode
              icon: mdi:repeat
              entities:
                - entity: text.ggs_fan_cycle_mode_start_time
                  name: Start Time
                - entity: number.ggs_fan_cycle_mode_run_time
                  name: Run Time
                - entity: number.ggs_fan_cycle_mode_off_time
                  name: Off Time
                - entity: number.ggs_fan_cycle_mode_cycles
                  name: Cycles
                - entity: number.ggs_fan_cycle_mode_speed
                  name: Speed
                - entity: number.ggs_fan_cycle_mode_standby_speed
                  name: Standby Speed
                - entity: number.ggs_fan_cycle_mode_oscillation
                  name: Oscillation
                - entity: switch.ggs_fan_cycle_mode_natural_wind
                  name: Natural Wind

          # Environment Mode — any of the 5 env variants
          - type: conditional
            conditions:
              - entity: fan.ggs_fan_circulation
                attribute: preset_mode
                state:
                  - "Environment: Prioritize temperature"
                  - "Environment: Prioritize humidity"
                  - "Environment: Temperature only"
                  - "Environment: Humidity only"
                  - "Environment: Temperature & humidity"
            card:
              type: entities
              title: Environment Mode
              icon: mdi:weather-partly-cloudy
              entities:
                - entity: select.ggs_fan_environment_mode_submode
                  name: Submode
                - entity: number.ggs_fan_environment_mode_speed
                  name: Speed
                - entity: number.ggs_fan_environment_mode_standby_speed
                  name: Standby Speed
                - entity: number.ggs_fan_environment_mode_oscillation
                  name: Oscillation
                - entity: switch.ggs_fan_environment_mode_natural_wind
                  name: Natural Wind

  # ── Fan Exhaust (blower) ──────────────────────────────────────────────────
  - title: Fan Exhaust
    icon: mdi:fan-chevron-up
    cards:

      - type: vertical-stack
        cards:
          - type: tile
            entity: fan.ggs_fan_exhaust
            name: Fan Exhaust
            features:
              - type: fan-speed
          # Dedicated mode picker — selecting a preset here swaps the
          # settings card below.
          - type: tile
            entity: fan.ggs_fan_exhaust
            name: Mode
            features:
              - type: fan-preset-modes
                style: dropdown

          # Schedule Mode
          - type: conditional
            conditions:
              - entity: fan.ggs_fan_exhaust
                attribute: preset_mode
                state: Schedule
            card:
              type: entities
              title: Schedule Mode
              icon: mdi:calendar-clock
              entities:
                - entity: text.ggs_fan_exhaust_schedule_mode_start_time
                  name: Start Time
                - entity: text.ggs_fan_exhaust_schedule_mode_end_time
                  name: End Time
                - entity: number.ggs_fan_exhaust_schedule_mode_speed
                  name: Speed
                - entity: number.ggs_fan_exhaust_schedule_mode_standby_speed
                  name: Standby Speed

          # Cycle Mode
          - type: conditional
            conditions:
              - entity: fan.ggs_fan_exhaust
                attribute: preset_mode
                state: Cycle
            card:
              type: entities
              title: Cycle Mode
              icon: mdi:repeat
              entities:
                - entity: text.ggs_fan_exhaust_cycle_mode_start_time
                  name: Start Time
                - entity: number.ggs_fan_exhaust_cycle_mode_run_time
                  name: Run Time
                - entity: number.ggs_fan_exhaust_cycle_mode_off_time
                  name: Off Time
                - entity: number.ggs_fan_exhaust_cycle_mode_cycles
                  name: Cycles
                - entity: number.ggs_fan_exhaust_cycle_mode_speed
                  name: Speed
                - entity: number.ggs_fan_exhaust_cycle_mode_standby_speed
                  name: Standby Speed

          # Environment Mode — any of the 5 env variants
          - type: conditional
            conditions:
              - entity: fan.ggs_fan_exhaust
                attribute: preset_mode
                state:
                  - "Environment: Prioritize temperature"
                  - "Environment: Prioritize humidity"
                  - "Environment: Temperature only"
                  - "Environment: Humidity only"
                  - "Environment: Temperature & humidity"
            card:
              type: entities
              title: Environment Mode
              icon: mdi:weather-partly-cloudy
              entities:
                - entity: select.ggs_fan_exhaust_environment_mode_submode
                  name: Submode
                - entity: number.ggs_fan_exhaust_environment_mode_speed
                  name: Speed
                - entity: number.ggs_fan_exhaust_environment_mode_standby_speed
                  name: Standby Speed

  # ── Air sensors + Climate switches + Outlets ──────────────────────────────
  - title: Overview
    icon: mdi:home
    cards:
      - type: entities
        title: Air
        icon: mdi:weather-windy
        entities:
          - sensor.ggs_air_temperature
          - sensor.ggs_air_humidity
          - sensor.ggs_air_vpd
          - sensor.ggs_air_co2
          - sensor.ggs_air_ppfd

      - type: entities
        title: Soil (avg)
        icon: mdi:sprout
        entities:
          - sensor.ggs_soil_avg_temperature
          - sensor.ggs_soil_avg_humidity
          - sensor.ggs_soil_avg_ec

      - type: entities
        title: Climate
        icon: mdi:thermostat
        entities:
          - switch.ggs_switch_heater
          - switch.ggs_switch_humidifier
          - switch.ggs_switch_dehumidifier

      - type: entities
        title: Outlets
        icon: mdi:power-socket-eu
        entities:
          - switch.ggs_outlet_1
          - switch.ggs_outlet_2
          - switch.ggs_outlet_3
          - switch.ggs_outlet_4
          - switch.ggs_outlet_5
          - switch.ggs_outlet_6
          - switch.ggs_outlet_7
          - switch.ggs_outlet_8
          - switch.ggs_outlet_9
          - switch.ggs_outlet_10
